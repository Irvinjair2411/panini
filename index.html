<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<title>🏆 Álbum Panini Mundial 2026</title>
<!-- iOS: permite "Agregar a pantalla de inicio" como app a pantalla completa -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panini 26">
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--red:#e8001c;--gold:#FFD700;--dark:#0a0a1a;--green:#00c853;--light:#e8edf5;--card:#111827}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Nunito',sans-serif;background:var(--dark);color:var(--light);min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;-webkit-font-smoothing:antialiased}
/* iOS: respetar el notch / barra inferior (safe-area) */
.hero{padding-top:max(20px,env(safe-area-inset-top))!important}
.wrap{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}
/* Las estampas y botones no se seleccionan ni hacen zoom por doble-tap */
.s,.fbtn,.thdr,.spc-hdr,.reset,.iobtn{touch-action:manipulation}
.hero{background:linear-gradient(135deg,#0a0a1a,#0d1b3e 40%,#1a0a2e);border-bottom:3px solid var(--gold);padding:20px 16px 16px;position:relative;overflow:hidden}
.hero::before{content:"2026";position:absolute;right:-10px;top:-20px;font-family:'Bebas Neue',cursive;font-size:180px;color:rgba(255,215,0,0.05);pointer-events:none}
.hero-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:14px}
.trophy{font-size:52px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.hero-text h1{font-family:'Bebas Neue',cursive;font-size:clamp(28px,6vw,52px);color:var(--gold);letter-spacing:2px;line-height:1}
.hero-text p{font-size:13px;color:#8899bb;font-weight:600;margin-top:2px}
.stats-bar{max-width:960px;margin:0 auto;padding:16px}
.big-prog{background:rgba(255,255,255,0.06);border-radius:16px;padding:16px 20px;border:1px solid rgba(255,215,0,0.2)}
.prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-lbl{font-size:13px;color:#8899bb;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.prog-pct{font-family:'Bebas Neue',cursive;font-size:36px;color:var(--gold);line-height:1}
.prog-track{background:rgba(255,255,255,0.08);border-radius:20px;height:16px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#e8001c,#FFD700);transition:width .8s cubic-bezier(.4,0,.2,1)}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.mini-stat{background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,0.08)}
.mini-val{font-family:'Bebas Neue',cursive;font-size:26px;line-height:1}
.green{color:var(--green)}.red{color:var(--red)}.gold{color:var(--gold)}
.mini-lbl{font-size:10px;color:#667;font-weight:700;text-transform:uppercase;margin-top:2px}
.controls{max-width:960px;margin:0 auto;padding:0 16px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:180px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:9px 14px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .2s}
.search:focus{border-color:var(--gold)}.search::placeholder{color:#445}
.fbtn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:9px 14px;color:#aac;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.fbtn:hover{border-color:var(--gold);color:var(--gold)}.fbtn.active{background:var(--gold);color:#000;border-color:var(--gold)}
.wrap{max-width:960px;margin:0 auto;padding:0 16px 40px;display:flex;flex-direction:column;gap:10px}
.grp-hdr{display:flex;align-items:center;gap:10px;padding:10px 4px 4px;flex-wrap:wrap}
.grp-pill{background:linear-gradient(135deg,var(--red),#ff4444);color:#fff;font-family:'Bebas Neue',cursive;font-size:15px;padding:4px 14px;border-radius:20px;letter-spacing:1px;white-space:nowrap}
.grp-teams{font-size:11px;color:#667;font-weight:700;flex:1}
.grp-prog{font-size:11px;color:#8899bb;font-weight:700;white-space:nowrap}
.spc{border-radius:16px;overflow:hidden;border:1px solid rgba(255,215,0,0.25);background:linear-gradient(135deg,rgba(255,215,0,0.08),rgba(255,215,0,0.02))}
.spc.coca{border-color:rgba(232,0,28,0.3);background:linear-gradient(135deg,rgba(232,0,28,0.1),rgba(232,0,28,0.02))}
.spc-hdr{padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.spc-icon{font-size:22px}
.spc-title{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--gold);letter-spacing:1px;flex:1}
.spc.coca .spc-title{color:#ff7777}
.spc-prog{font-size:12px;color:#8899bb;font-weight:700}
.tcard{background:var(--card);border-radius:16px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;transition:border-color .2s}
.tcard:hover{border-color:rgba(255,255,255,0.15)}.tcard.done{border-color:rgba(0,200,83,0.35)}.tcard.hidden{display:none}
.thdr{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.tflag{font-size:24px;flex-shrink:0}
.tflag img{width:30px;height:30px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 2px rgba(255,255,255,.15),0 1px 3px rgba(0,0,0,.4);background:#222;vertical-align:middle}
.tinfo{flex:1}.tname{font-weight:800;font-size:15px;line-height:1.2}
.tsub{font-size:11px;color:#556;font-weight:600;margin-top:2px}
.tbar-wrap{flex:1;max-width:100px}
.tbar{height:6px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden}
.tbar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#e8001c,#FFD700);transition:width .4s}
.tpct{font-size:11px;color:#8899bb;text-align:right;font-weight:700;margin-top:2px}
.badge{width:28px;height:28px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;opacity:0;transition:opacity .3s}
.badge.on{opacity:1}
.chev{color:#556;font-size:13px;transition:transform .3s}.chev.open{transform:rotate(180deg)}
.panel{display:none;padding:8px 16px 16px;border-top:1px solid rgba(255,255,255,0.06);animation:fi .25s ease}
.panel.open{display:block}
@keyframes fi{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:6px}
.s{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;padding:6px 4px;text-align:center;cursor:pointer;transition:all .18s;position:relative;user-select:none}
.s:hover{transform:scale(1.06);border-color:rgba(255,215,0,0.4)}
.s.on{background:rgba(0,200,83,0.15);border-color:rgba(0,200,83,0.5)}
.s.foil{background:linear-gradient(135deg,rgba(255,215,0,0.1),rgba(255,100,0,0.05));border-color:rgba(255,215,0,0.3)}
.s.foil.on{background:linear-gradient(135deg,rgba(255,215,0,0.25),rgba(255,100,0,0.12));border-color:var(--gold)}
.s.coca{background:linear-gradient(135deg,rgba(232,0,28,0.1),rgba(232,0,28,0.03));border-color:rgba(232,0,28,0.3)}
.s.coca.on{background:rgba(232,0,28,0.2);border-color:rgba(232,0,28,0.7)}
.sc{font-size:9px;color:#667;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.sn{font-family:'Bebas Neue',cursive;font-size:18px;color:#ccd;line-height:1;margin:1px 0}
.s.on .sn{color:var(--green)}.s.foil .sn{color:var(--gold)}.s.coca .sn{color:#ff9999}
.sl{font-size:8px;color:#556;font-weight:700;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.s.on .sl{color:rgba(0,200,83,0.8)}
.sck{position:absolute;top:3px;right:3px;font-size:10px;opacity:0;transition:opacity .2s}
.s.on .sck{opacity:1}
/* Boton "+repetida": solo visible cuando ya la tengo */
.dadd{position:absolute;top:1px;left:2px;width:18px;height:18px;border-radius:50%;
  background:rgba(255,215,0,0.18);color:var(--gold);font-size:14px;font-weight:900;line-height:17px;
  text-align:center;opacity:0;transition:opacity .2s;cursor:pointer}
.s.on .dadd{opacity:1}.dadd:hover{background:var(--gold);color:#000}
/* Badge "×N" de repetidas (toca para bajar) */
.dupb{position:absolute;bottom:2px;right:2px;background:#ff7b00;color:#fff;font-size:10px;font-weight:800;
  padding:1px 5px;border-radius:9px;cursor:pointer;line-height:1.3;box-shadow:0 1px 2px rgba(0,0,0,.4)}
.miss{margin-top:10px;padding:10px 12px;background:rgba(232,0,28,0.06);border:1px solid rgba(232,0,28,0.15);border-radius:10px}
.miss-t{font-size:11px;color:#e8001c;font-weight:800;text-transform:uppercase;margin-bottom:6px;letter-spacing:1px}
.miss-c{font-size:11px;color:#889;font-weight:600;line-height:1.6}
.reset{display:block;margin:8px auto 0;background:transparent;border:1px solid rgba(255,0,0,0.2);color:rgba(255,100,100,0.6);border-radius:8px;padding:6px 16px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.reset:hover{border-color:red;color:red}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;font-weight:800;font-size:13px;padding:10px 20px;border-radius:30px;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}.toast.red{background:var(--red);color:#fff}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;padding:20px;
  align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:var(--card);border:1px solid rgba(255,215,0,.3);border-radius:16px;max-width:520px;
  width:100%;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.modal-hd{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);font-family:'Bebas Neue',cursive;font-size:22px;color:var(--gold);letter-spacing:1px}
.modal-x{cursor:pointer;color:#889;font-size:18px}
.modal-body{padding:16px 18px;overflow-y:auto}
.cbk{margin-bottom:16px}
.cbk h4{font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.cbk .codes{font-size:12px;color:#aab;font-weight:600;line-height:1.7;word-break:break-word;
  background:rgba(255,255,255,.04);padding:10px;border-radius:8px;max-height:180px;overflow-y:auto}
.cpy{display:inline-block;margin-top:8px;background:var(--gold);color:#000;border:0;border-radius:8px;
  padding:7px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;cursor:pointer}
</style>
</head>

  </div>
</div>

</div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">

</div>
<div class="wrap" id="wrap"></div>

// ── STORAGE — funciona en iPhone local file (Safari bloquea localStorage) ─────
const STORE_KEY='panini26_v3';
function storageGet(){
  try{const v=localStorage.getItem(STORE_KEY);return v?JSON.parse(v):{};}
  catch(e){return{};}
}
function storageSave(data){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(data));}
  catch(e){
    // fallback: guardar en cookie (funciona en Safari local)
    try{document.cookie=STORE_KEY+'='+encodeURIComponent(JSON.stringify(data))+';max-age=31536000;path=/';}
    catch(e2){}
  }
}
function cookieGet(){
  try{
    const m=document.cookie.match(new RegExp('(?:^|; )'+STORE_KEY+'=([^;]*)'));
    return m?JSON.parse(decodeURIComponent(m[1])):{};
  }catch(e){return{};}
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let owned=(function(){const a=storageGet();const b=cookieGet();return Object.keys(a).length?a:b;})();
let fMode='all';
function save(){storageSave(owned);}

// ── REPETIDAS (cambios) ────────────────────────────────────────────────────────
const DUP_KEY='panini26_dupes_v1';
function dupesGet(){try{const v=localStorage.getItem(DUP_KEY);return v?JSON.parse(v):{};}catch(e){return{};}}
let dupes=dupesGet();
function dupesSave(){try{localStorage.setItem(DUP_KEY,JSON.stringify(dupes));}catch(e){
  try{document.cookie=DUP_KEY+'='+encodeURIComponent(JSON.stringify(dupes))+';max-age=31536000;path=/';}catch(e2){}}}
function addDup(code,el){
  if(!owned[code]){owned[code]=true;save();} // si marcas repe, tambien la tienes
  dupes[code]=(dupes[code]||0)+1;dupesSave();
  toast('🔁 '+code+' ×'+dupes[code]+' repetida(s)');
  const tid=findTid(code);if(tid){refreshTeam(tid);refreshGroup(tid);}
  updateStats();renderDupBadge(code,el);
}
function subDup(code,el){
  if(!dupes[code])return;
  dupes[code]--;if(dupes[code]<=0)delete dupes[code];dupesSave();
  toast('🔁 '+code+(dupes[code]?' ×'+dupes[code]:' sin repetidas'),true);
  updateStats();renderDupBadge(code,el);
}
function renderDupBadge(code,srcEl){
  const cell=(srcEl&&srcEl.closest)?srcEl.closest('.s'):document.querySelector(`.s[data-c="${code}"]`);
  if(!cell)return;
  let b=cell.querySelector('.dupb');
  const n=dupes[code]||0;
  if(n>0){
    if(!b){b=document.createElement('div');b.className='dupb';
      b.onclick=function(e){e.stopPropagation();subDup(code,b);};
      cell.appendChild(b);}
    b.textContent='×'+n;
  }else if(b)b.remove();
}

// ── EXPORTAR / IMPORTAR progreso (respaldo anti-perdida, clave en iPhone) ──────
// En Safari iOS sobre file:// el localStorage se puede borrar; esto deja al
// usuario respaldar su album en Notas/WhatsApp y restaurarlo cuando quiera.
function exportData(){
  const codes=Object.keys(owned).filter(c=>owned[c]);
  const dl=Object.keys(dupes).filter(c=>dupes[c]>0).map(c=>c+'*'+dupes[c]);
  let txt='PANINI26:'+codes.join(',');
  if(dl.length)txt+=';DUP:'+dl.join(',');
  const done=()=>toast('✅ Copiado: pegalo en Notas para respaldar');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackPrompt(txt));
  }else{fallbackPrompt(txt);}
}
function fallbackPrompt(txt){
  // Si no hay clipboard, mostramos el codigo para copiar a mano
  window.prompt('Copia este codigo y guardalo (Notas/WhatsApp):',txt);
}
// ── MODAL "CAMBIOS": faltantes para comprar + repetidas para ofrecer ──────────
function closeModal(){document.getElementById('modal').classList.remove('open');}
function showCambios(){
  const all=allSt();
  const faltan=all.filter(s=>!owned[s.c]).map(s=>s.c);
  const repes=Object.keys(dupes).filter(c=>dupes[c]>0).map(c=>c+'×'+dupes[c]);
  const fTxt=faltan.join(', ')||'¡Ninguna, álbum completo! 🎉';
  const rTxt=repes.join(', ')||'Aún no marcas repetidas (toca el + en una estampa que ya tengas)';
  document.getElementById('modalTitle').textContent='🔁 Para el puesto / cambios';
  document.getElementById('modalBody').innerHTML=
    `<div class="cbk"><h4 class="red">⬇️ Me faltan (${faltan.length}) — para comprar</h4>`+
    `<div class="codes" id="cFaltan">${fTxt}</div>`+
    (faltan.length?`<button class="cpy" onclick="copyText(document.getElementById('cFaltan').textContent,this)">Copiar faltantes</button>`:'')+
    `</div>`+
    `<div class="cbk"><h4 class="green">🔁 Tengo repetidas (${repes.length}) — para ofrecer</h4>`+
    `<div class="codes" id="cRepes">${rTxt}</div>`+
    (repes.length?`<button class="cpy" onclick="copyText(document.getElementById('cRepes').textContent,this)">Copiar repetidas</button>`:'')+
    `</div>`;
  document.getElementById('modal').classList.add('open');
}
function copyText(txt,btn){
  const ok=()=>{const o=btn.textContent;btn.textContent='✓ Copiado';setTimeout(()=>btn.textContent=o,1500);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(ok).catch(()=>window.prompt('Copia:',txt));}
  else window.prompt('Copia:',txt);
}
function importData(){
  const txt=window.prompt('Pega aqui tu codigo de respaldo (empieza con PANINI26:):','');
  if(!txt)return;
  let body=txt.trim().replace(/^PANINI26:/,'');
  if(!body){toast('❌ Codigo vacio',true);return;}
  // Separar parte de owned y parte de repetidas (;DUP:)
  let dupPart='';
  const di=body.indexOf(';DUP:');
  if(di>=0){dupPart=body.slice(di+5);body=body.slice(0,di);}
  const codes=body.split(',').map(s=>s.trim()).filter(Boolean);
  if(!codes.length){toast('❌ Codigo invalido',true);return;}
  owned={};codes.forEach(c=>{owned[c]=true;});
  dupes={};
  if(dupPart){dupPart.split(',').forEach(p=>{const[c,n]=p.split('*');if(c)dupes[c.trim()]=parseInt(n)||1;});}
  save();dupesSave();renderAll();
  toast('✅ Restauradas '+codes.length+' estampas'+(Object.keys(dupes).length?' + repetidas':''));
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function allSt(){
  const a=[];
  INTRO.stickers.forEach(s=>a.push({c:s.code,tid:'INTRO'}));
  COCA.stickers.forEach(s=>a.push({c:s.code,tid:'COCA'}));
  GROUPS.forEach(g=>g.teams.forEach(t=>t.st.forEach(s=>a.push({c:s.c,tid:t.id}))));
  return a;
}
function teamById(id){
  if(id==='INTRO')return INTRO;
  if(id==='COCA')return COCA;
  for(const g of GROUPS)for(const t of g.teams)if(t.id===id)return t;
  return null;
}
function groupOf(id){for(const g of GROUPS)for(const t of g.teams)if(t.id===id)return g;return null}
function oCount(arr){return arr.filter(s=>owned[s.c||s.code]).length}
function stArr(t){return t.st||t.stickers||[]}
// Normaliza para buscar: minusculas y SIN acentos ("México"->"mexico")
function norm(s){return (s||'').toLowerCase().normalize('NFD').split('').filter(function(ch){var k=ch.charCodeAt(0);return k<768||k>879;}).join('');}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats(){
  const all=allSt();
  const total=all.length,o=all.filter(s=>owned[s.c]).length;
  const pct=total?Math.round(o/total*100):0;
  document.getElementById('pPct').textContent=pct+'%';
  document.getElementById('pBar').style.width=pct+'%';
  document.getElementById('pOwned').textContent=o;
  document.getElementById('pMiss').textContent=total-o;
  document.getElementById('pTotal').textContent=total;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function sEl(s,isCoca){
  const c=s.c||s.code,n=s.n||s.name;
  const on=owned[c]?'on':'';
  const fc=s.f?'foil':(s.coca||isCoca)?'coca':'';
  const disp=s.f?'★':(s.coca||isCoca)?'🥤':(c.replace(/[A-Za-z]+/g,'').replace(/^0+/,'')||c);
  const nd=dupes[c]||0;
  return`<div class="s ${on} ${fc}" data-c="${c}" onclick="tap('${c}',this)">
    <div class="sc">${c}</div><div class="sn">${disp}</div>
    <div class="sl">${n}</div><div class="sck">✓</div>
    <div class="dadd" title="Tengo otra (repetida)" onclick="event.stopPropagation();addDup('${c}',this)">+</div>
    ${nd>0?`<div class="dupb" onclick="event.stopPropagation();subDup('${c}',this)">×${nd}</div>`:''}
  </div>`;
}
function spHTML(sec){
  const sts=stArr(sec);
  const o=oCount(sts);
  return`<div class="spc${sec.isCoca?' coca':''}" id="T_${sec.id}">
    <div class="spc-hdr" onclick="tog('${sec.id}')">
      <span class="spc-icon">${sec.flag}</span>
      <span class="spc-title">${sec.name}</span>
      <span class="spc-prog" id="SP_${sec.id}">${o}/${sts.length}</span>
      <span class="chev" id="CH_${sec.id}">▼</span>
    </div>
    <div class="panel" id="PN_${sec.id}">
      <div class="sgrid">${sts.map(s=>sEl(s,sec.isCoca)).join('')}</div>
    </div>
  </div>`;
}
// Mapa codigo FIFA (3 letras del album) -> ISO 2 letras para flagcdn.
// gb-eng / gb-sct = banderas propias de Inglaterra y Escocia.
const ISO2={MEX:'mx',RSA:'za',KOR:'kr',CZE:'cz',CAN:'ca',BIH:'ba',QAT:'qa',SUI:'ch',
BRA:'br',MAR:'ma',HAI:'ht',SCO:'gb-sct',USA:'us',PAR:'py',AUS:'au',TUR:'tr',GER:'de',
CUW:'cw',CIV:'ci',ECU:'ec',NED:'nl',JPN:'jp',SWE:'se',TUN:'tn',BEL:'be',EGY:'eg',
IRN:'ir',NZL:'nz',ESP:'es',CPV:'cv',KSA:'sa',URU:'uy',FRA:'fr',SEN:'sn',IRQ:'iq',
NOR:'no',ARG:'ar',ALG:'dz',AUT:'at',JOR:'jo',POR:'pt',COD:'cd',UZB:'uz',COL:'co',
ENG:'gb-eng',CRO:'hr',GHA:'gh',PAN:'pa'};
function flagImg(id,emoji){
  const c=ISO2[id];
  if(!c)return emoji||'⚽';
  return `<img loading="lazy" src="https://flagcdn.com/w80/${c}.png" alt="${id}" `+
         `onerror="this.replaceWith(document.createTextNode('${emoji||'⚽'}'))">`;
}
function tcHTML(t){
  const sts=t.st;
  const o=oCount(sts),total=sts.length,pct=Math.round(o/total*100),done=o===total;
  const mc=sts.filter(s=>!owned[s.c]).map(s=>s.c).join(' · ');
  return`<div class="tcard${done?' done':''}" id="T_${t.id}" data-s="${norm(t.name)} ${sts.map(s=>norm(s.n)).join(' ')}">
    <div class="thdr" onclick="tog('${t.id}')">
      <span class="tflag">${flagImg(t.id,t.flag)}</span>
      <div class="tinfo">
        <div class="tname">${t.name} <span style="font-size:10px;color:#445;font-weight:600">· pág. ${t.pg}</span></div>
        <div class="tsub" id="SB_${t.id}">${o} de ${total} estampillas</div>
      </div>
      <div class="tbar-wrap">
        <div class="tbar"><div class="tbar-fill" id="BF_${t.id}" style="width:${pct}%"></div></div>
        <div class="tpct" id="PT_${t.id}">${pct}%</div>
      </div>
      <div class="badge${done?' on':''}" id="BD_${t.id}">✓</div>
      <span class="chev" id="CH_${t.id}">▼</span>
    </div>
    <div class="panel" id="PN_${t.id}">
      <div class="sgrid">${sts.map(s=>sEl(s)).join('')}</div>
      ${mc?`<div class="miss" id="ML_${t.id}"><div class="miss-t">⚠ Faltan</div><div class="miss-c" id="MC_${t.id}">${mc}</div></div>`:''}
      <button class="reset" onclick="event.stopPropagation();resetT('${t.id}')">↺ Resetear ${t.name}</button>
    </div>
  </div>`;
}
function renderAll(){
  let html=spHTML(INTRO)+spHTML(COCA);
  GROUPS.forEach(g=>{
    const sts=g.teams.flatMap(t=>t.st);
    const o=oCount(sts);
    html+=`<div class="grp-hdr">
      <span class="grp-pill">Grupo ${g.g}</span>
      <span class="grp-teams">${g.label}</span>
      <span class="grp-prog" id="GP_${g.g}">${o}/${sts.length}</span>
    </div>`;
    g.teams.forEach(t=>{html+=tcHTML(t);});
  });
  document.getElementById('wrap').innerHTML=html;
  updateStats();
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function findTid(code){
  for(const s of INTRO.stickers)if(s.code===code)return'INTRO';
  for(const s of COCA.stickers)if(s.code===code)return'COCA';
  for(const g of GROUPS)for(const t of g.teams)if(t.st.some(s=>s.c===code))return t.id;
  return null;
}
function tap(code,el){
  owned[code]=!owned[code];save();
  el.classList.toggle('on',owned[code]);
  // Si la quito, ya no puede tener repetidas
  if(!owned[code]&&dupes[code]){delete dupes[code];dupesSave();renderDupBadge(code,el);}
  toast(owned[code]?'✅ ¡Conseguida!':'❌ Eliminada',!owned[code]);
  const tid=findTid(code);
  if(tid){refreshTeam(tid);refreshGroup(tid);}
  updateStats();
}
function refreshTeam(id){
  const t=teamById(id);if(!t)return;
  const sts=stArr(t);
  const o=oCount(sts),total=sts.length;
  if(t.special){const sp=document.getElementById(`SP_${id}`);if(sp)sp.textContent=`${o}/${total}`;return;}
  const pct=Math.round(o/total*100),done=o===total;
  const card=document.getElementById(`T_${id}`);if(card)card.classList.toggle('done',done);
  const sb=document.getElementById(`SB_${id}`);if(sb)sb.textContent=`${o} de ${total} estampillas`;
  const bf=document.getElementById(`BF_${id}`);if(bf)bf.style.width=pct+'%';
  const pt=document.getElementById(`PT_${id}`);if(pt)pt.textContent=pct+'%';
  const bd=document.getElementById(`BD_${id}`);if(bd)bd.classList.toggle('on',done);
  const mc=sts.filter(s=>!owned[s.c]).map(s=>s.c).join(' · ');
  const panel=document.getElementById(`PN_${id}`);if(!panel)return;
  let ml=document.getElementById(`ML_${id}`);
  if(mc){
    if(!ml){ml=document.createElement('div');ml.className='miss';ml.id=`ML_${id}`;ml.innerHTML=`<div class="miss-t">⚠ Faltan</div><div class="miss-c" id="MC_${id}"></div>`;panel.querySelector('.reset').before(ml);}
    document.getElementById(`MC_${id}`).textContent=mc;
  }else if(ml)ml.remove();
}
function refreshGroup(id){
  const g=groupOf(id);if(!g)return;
  const sts=g.teams.flatMap(t=>t.st);
  const o=oCount(sts);
  const el=document.getElementById(`GP_${g.g}`);if(el)el.textContent=`${o}/${sts.length}`;
}
function tog(id){
  const p=document.getElementById(`PN_${id}`),c=document.getElementById(`CH_${id}`);
  const open=p.classList.toggle('open');c.classList.toggle('open',open);
}
function resetT(id){
  const t=teamById(id);if(!t||!confirm(`¿Resetear ${t.name}?`))return;
  stArr(t).forEach(s=>{const c=s.c||s.code;delete owned[c];delete dupes[c];});save();dupesSave();
  document.getElementById(`PN_${id}`).querySelectorAll('.s.on').forEach(e=>e.classList.remove('on'));
  refreshTeam(id);refreshGroup(id);updateStats();
}
function setF(f,btn){fMode=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filterAll();}
function filterAll(){
  const q=norm(document.getElementById('qInput').value.trim());
  document.querySelectorAll('.tcard').forEach(card=>{
    const id=card.id.replace('T_','');
    const t=teamById(id);if(!t||t.special)return;
    const sts=t.st;
    const o=oCount(sts);
    const nm=!q||card.dataset.s.includes(q);
    let show=nm;
    if(fMode==='done')show=show&&o===sts.length;
    if(fMode==='miss')show=show&&o<sts.length;
    card.classList.toggle('hidden',!show);
  });
}
let tt;
function toast(msg,red){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(red?' red':'');
  clearTimeout(tt);tt=setTimeout(()=>el.className='toast',1800);
}
// Render blindado: si algo falla (p.ej. en Safari iOS), muestra el error en
// pantalla en vez de quedar TODO VACIO — asi siempre sabemos que paso.
function safeRender(){
  try{renderAll();}
  catch(e){
    var w=document.getElementById('wrap');
    if(w)w.innerHTML='<div style="padding:24px;color:#ff8888;font-weight:700;line-height:1.6">'+
      '⚠ Error al cargar el album:<br><br><code style="color:#ffd700;font-size:12px">'+
      (e&&e.message?e.message:e)+'</code><br><br>Mandale esta pantalla a Claude.</div>';
  }
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',safeRender);
}else{
  safeRender();
}
</script>
